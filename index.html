<!DOCTYPE html>
<html lang="ja" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NakataSapporo Presents My Web Apps Portfolio - アプリケーション一覧</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'Noto Sans JP', 'sans-serif'] },
          colors: { brand: { 50: '#f0f7ff', 100: '#e0effe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .dark ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-full transition-colors duration-300 flex flex-col">

  <header class="sticky top-0 z-40 w-full border-b border-slate-200/80 bg-slate-50/80 backdrop-blur dark:border-slate-800/80 dark:bg-slate-900/80 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-500 flex items-center justify-center text-white shadow-md shadow-blue-500/20">
          <i class="fa-solid fa-cubes text-xl"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-500 dark:from-blue-400 dark:to-indigo-300 bg-clip-text text-transparent">AppSuite</h1>
          <p class="text-xs text-slate-500 dark:text-slate-400">Web App Collection</p>
        </div>
      </div>

      <div class="flex items-center space-x-3">
        <button id="theme-toggle" class="p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500">
          <i id="theme-toggle-dark-icon" class="hidden fa-solid fa-moon text-lg"></i>
          <i id="theme-toggle-light-icon" class="hidden fa-solid fa-sun text-lg"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <div class="text-center md:text-left md:flex md:items-center md:justify-between border-b border-slate-200 dark:border-slate-800 pb-8 mb-8">
      <div class="max-w-2xl">
        <h2 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white sm:text-4xl">マイ・Webアプリケーション集<BR></BR>By NakataSapporo</h2>
        <p class="mt-3 text-lg text-slate-500 dark:text-slate-400">これまでに生成AIで開発した自作のWEBツールを集約しました。ブラウザ上で直接動作します。</p>
      </div>
      <div class="mt-6 md:mt-0 flex flex-wrap justify-center gap-4 text-sm font-medium">
        <div class="px-4 py-2 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm flex items-center space-x-2">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
          <span id="app-count-badge" class="text-slate-600 dark:text-slate-300 font-medium">ロード中...</span>
        </div>
      </div>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-5 mb-8 shadow-sm">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div class="relative flex-grow max-w-lg">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400">
            <i class="fa-solid fa-magnifying-glass"></i>
          </span>
          <input type="text" id="search-input" placeholder="アプリ名、説明、技術タグで検索..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white">
        </div>
        <div class="flex flex-wrap items-center gap-2" id="filter-buttons-container"></div>
      </div>
    </div>

    <div id="apps-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <div id="no-results" class="hidden text-center py-16">
      <div class="w-16 h-16 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-cube text-slate-400 text-2xl"></i>
      </div>
      <h3 class="text-lg font-medium text-slate-900 dark:text-white">見つかりませんでした</h3>
    </div>
  </main>

  <footer class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/40 py-6 text-center text-sm text-slate-500">
    <p>© 2026 AppSuite. All Rights Reserved.</p>
  </footer>

  <div id="app-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
    <div class="bg-white dark:bg-slate-800 w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden transform scale-95 transition-transform duration-300">
      <div class="relative">
        <div id="modal-banner" class="h-40 bg-gradient-to-r flex items-center justify-center text-white">
          <i id="modal-banner-icon" class="fa-solid text-6xl opacity-35"></i>
        </div>
        <button id="modal-close" class="absolute top-4 right-4 bg-slate-900/40 text-white rounded-full p-2 hover:bg-slate-900/60"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="p-6">
        <div class="flex flex-wrap gap-2 mb-3" id="modal-tags"></div>
        <h3 id="modal-title" class="text-2xl font-bold text-slate-900 dark:text-white mb-2"></h3>
        <p id="modal-description" class="text-slate-600 dark:text-slate-300 mb-6 leading-relaxed"></p>
        <div class="border-t border-slate-100 dark:border-slate-700 pt-5 flex items-center justify-between">
          <div>
            <span class="text-xs text-slate-400 block">動作要件</span>
            <span class="text-sm text-slate-600 dark:text-slate-400 font-medium">モダンブラウザ対応</span>
          </div>
          <div class="flex space-x-3">
            <button id="modal-close-btn" class="px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl text-sm font-medium hover:bg-slate-50">閉じる</button>
            <a id="modal-launch-link" href="#" class="px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium shadow-md flex items-center space-x-2"><span>アプリを起動する</span><i class="fa-solid fa-arrow-up-right-from-square text-xs"></i></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========================================================================
    // 【管理者用】掲載するアプリケーションの一覧データ
    // アプリを追加・変更したい場合は、以下の配列の中身を直接編集してください。
    // ========================================================================
    const myApps = [
     
      { 
        id: "hiraganakatakana50on", 
        title: "ひらながカタカナボード", 
        description: "ひらがなとカタカナの文字を並べて音声で読み上げるアプリです。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/50on/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
       { 
        id: "tashizanhikizan", 
        title: "足し算引き算アプリ", 
        description: "20までの数と10までの数を、足し算と引き算する小学生低学年向けのアプリです。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/tashizanhikizan/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
       { 
        id: "junban", 
        title: "順番決めルーレット", 
        description: "その場で写真を撮って、順番を決められるルーレットです。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/junban/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
       { 
        id: "gakusyuhi", 
        title: "学習費割り勘アプリ", 
        description: "学習費を児童生徒で割ると出てくる端数をどう配分するかがすぐに出てきます。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/gakusyuhikeisan/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
      { 
        id: "dochikana", 
        title: "二択選択アプリ", 
        description: "絵カードや写真カードを二択で選ぶ問題を作成し、問題自体も音声で読み上げることができます。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/dochikana/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
       { 
        id: "heiftojpeg", 
        title: "HeifファイルをJpegファイルに変換", 
        description: "iPadなどで撮影したHeifファイルをJpegファイルに変換するアプリです。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/heiftojpeg/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
      { 
        id: "audiospeedchanger", 
        title: "オーディオスピードチェンジャー", 
        description: "音楽ファイルを音程を変えずにスピードを変えるアプリです。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/audiospeedchanger/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
       { 
        id: "irogakuhu", 
        title: "色楽譜制作アプリ", 
        description: "簡単な楽譜を色楽譜にすることができるアプリです。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/irogakuhu/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
       { 
        id: "yotei", 
        title: "簡単予定タイマーアプリ", 
        description: "写真や画像と視覚的に分かりやすいタイマーを設置したタイマーアプリです。教師用画面のパスワードは1234です。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/yotei/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
       { 
        id: "1nenkanji", 
        title: "小学1年生の漢字", 
        description: "小学1年生の漢字の一覧です。書き順を表示したり、読み方を音声で読み上げることができます。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/1nenkanji/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
      { 
        id: "2nenkanji", 
        title: "小学２年生の漢字", 
        description: "小学２年生の漢字の一覧です。書き順を表示したり、読み方を音声で読み上げることができます。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/2nenkanji/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
       { 
        id: "3nenkanji", 
        title: "小学３年生の漢字", 
        description: "小学３年生の漢字の一覧です。書き順を表示したり、読み方を音声で読み上げることができます。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/3nenkanji/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
      { 
        id: "onseitimer", 
        title: "音タイマー", 
        description: "音の違いで、どのくらい待てばいいのか分かることを目的としたタイマーです。", 
        category: "utility", 
        tags: ["Utility"], 
        icon: "fa-solid fa-chart-kanban", 
        path: "https://nakatasapporo-create.github.io/onseitimer/", 
        gradient: "from-blue-600 to-cyan-500", 
        releaseDate: "2026-06" 
      },
    ];

    // カテゴリの日本語マップ
    const categoryLabels = { all: "すべて", game: "ゲーム", utility: "便利ツール", creative: "クリエイティブ", ai: "AIアプリ" };

    // ダークモード制御
    const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
    const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark'); themeToggleLightIcon.classList.remove('hidden');
    } else { document.documentElement.classList.remove('dark'); themeToggleDarkIcon.classList.remove('hidden'); }

    document.getElementById('theme-toggle').addEventListener('click', function() {
      themeToggleDarkIcon.classList.toggle('hidden'); themeToggleLightIcon.classList.toggle('hidden');
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark'); localStorage.setItem('color-theme', 'light');
      } else { document.documentElement.classList.add('dark'); localStorage.setItem('color-theme', 'dark'); }
    });

    // 状態管理
    let currentFilter = 'all'; 
    let searchQuery = '';

    // DOM要素
    const appsGrid = document.getElementById('apps-grid');
    const noResults = document.getElementById('no-results');
    const searchInput = document.getElementById('search-input');
    const filterButtonsContainer = document.getElementById('filter-buttons-container');
    const appCountBadge = document.getElementById('app-count-badge');

    const appModal = document.getElementById('app-modal'); 
    const modalTitle = document.getElementById('modal-title');
    const modalDescription = document.getElementById('modal-description'); 
    const modalBanner = document.getElementById('modal-banner');
    const modalBannerIcon = document.getElementById('modal-banner-icon'); 
    const modalTags = document.getElementById('modal-tags');
    const modalLaunchLink = document.getElementById('modal-launch-link');

    // カテゴリフィルターボタンの生成
    function renderFilterButtons() {
      const currentCategories = ['all', ...new Set(myApps.map(app => app.category))];
      filterButtonsContainer.innerHTML = '';
      currentCategories.forEach(cat => {
        const isActive = currentFilter === cat;
        const btn = document.createElement('button');
        btn.className = `px-4 py-1.5 rounded-full text-xs font-semibold transition-all ${isActive ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400 hover:bg-slate-200'}`;
        btn.textContent = categoryLabels[cat] || cat;
        btn.addEventListener('click', () => { currentFilter = cat; renderFilterButtons(); renderApps(); });
        filterButtonsContainer.appendChild(btn);
      });
    }

    // アプリカードの表示処理
    function renderApps() {
      appsGrid.innerHTML = '';
      const filteredApps = myApps.filter(app => {
        const matchesCategory = currentFilter === 'all' || app.category === currentFilter;
        const combinedText = `${app.title} ${app.description} ${(app.tags || []).join(' ')}`.toLowerCase();
        return matchesCategory && combinedText.includes(searchQuery.toLowerCase());
      });

      appCountBadge.innerHTML = `<i class="fa-solid fa-folder-open text-emerald-500 mr-1.5"></i>全 <strong>${myApps.length}</strong> 個 (表示中: ${filteredApps.length})`;

      if (filteredApps.length === 0) {
        appsGrid.classList.add('hidden'); noResults.classList.remove('hidden'); return;
      }
      appsGrid.classList.remove('hidden'); noResults.classList.add('hidden');

      filteredApps.forEach(app => {
        const card = document.createElement('div');
        card.className = "group bg-white dark:bg-slate-800 rounded-2xl border border-slate-200/80 dark:border-slate-700/80 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 flex flex-col h-full";
        
        const tagsHtml = (app.tags || []).slice(0, 3).map(tag => `<span class="px-2 py-0.5 rounded-md text-[10px] font-semibold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300">${tag}</span>`).join('');

        card.innerHTML = `
          <div class="h-32 bg-gradient-to-tr ${app.gradient || 'from-blue-600 to-indigo-600'} relative flex items-center justify-center">
            <div class="w-14 h-14 rounded-2xl bg-white/15 backdrop-blur-md flex items-center justify-center text-white"><i class="${app.icon || 'fa-solid fa-cubes'} text-2xl"></i></div>
            <span class="absolute top-3 right-3 px-2 py-0.5 rounded bg-black/20 text-white text-[10px]">${app.releaseDate || '2026'}</span>
          </div>
          <div class="p-5 flex-grow flex flex-col">
            <div class="flex items-center space-x-1.5 mb-2">${tagsHtml}</div>
            <h4 class="text-lg font-bold text-slate-900 dark:text-white mb-1.5 line-clamp-1">${app.title}</h4>
            <p class="text-sm text-slate-500 dark:text-slate-400 line-clamp-2 mb-4 flex-grow">${app.description}</p>
            <div class="flex items-center space-x-2 pt-3 border-t border-slate-100 dark:border-slate-700/60">
              <button class="details-btn flex-1 py-2 bg-slate-50 dark:bg-slate-700/50 text-slate-700 dark:text-slate-300 rounded-xl text-xs font-semibold flex items-center justify-center space-x-1" data-id="${app.id}"><i class="fa-solid fa-circle-info"></i><span>詳細</span></button>
              <a href="${app.path}" class="flex-1 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl text-xs font-semibold text-center flex items-center justify-center space-x-1"><span>起動する</span><i class="fa-solid fa-play text-[10px]"></i></a>
            </div>
          </div>
        `;
        card.querySelector('.details-btn').addEventListener('click', (e) => openModal(e.currentTarget.getAttribute('data-id')));
        appsGrid.appendChild(card);
      });
    }

    // 詳細モーダルの開閉
    function openModal(appId) {
      const app = myApps.find(a => a.id === appId); if (!app) return;
      modalTitle.textContent = app.title; modalDescription.textContent = app.description; modalLaunchLink.href = app.path;
      modalBanner.className = `h-40 bg-gradient-to-r ${app.gradient || 'from-blue-600 to-indigo-600'} flex items-center justify-center text-white relative`;
      modalBannerIcon.className = `${app.icon || "fa-solid fa-cubes"} text-7xl opacity-30`;
      modalTags.innerHTML = (app.tags || []).map(tag => `<span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-50 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400 border border-blue-100 dark:border-blue-800/40">${tag}</span>`).join('');
      appModal.classList.remove('hidden');
      setTimeout(() => { appModal.classList.remove('opacity-0'); appModal.querySelector('div').className = appModal.querySelector('div').className.replace('scale-95', 'scale-100'); }, 50);
    }

    function closeModal() {
      appModal.classList.add('opacity-0');
      setTimeout(() => appModal.classList.add('hidden'), 300);
    }
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-close-btn').addEventListener('click', closeModal);

    // 検索入力イベント
    searchInput.addEventListener('input', (e) => { searchQuery = e.target.value; renderApps(); });
    
    // 初期起動
    window.addEventListener('DOMContentLoaded', () => { renderFilterButtons(); renderApps(); });
  </script>
</body>
</html>
